<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>质控统计与DRG统计</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header class="page-header">
      <div class="view-tabs" aria-label="统计视图切换">
        <button class="view-tab active" id="btnTabQuality" type="button">质控统计</button>
        <button class="view-tab" id="btnTabDrg" type="button">DRG统计</button>
      </div>
      <button class="btn-secondary" id="btnExport" disabled>导出 CSV</button>
    </header>

    <section class="filter-card">
      <div class="filter-row filter-row-one">
        <label>
          科室
          <select id="department" class="select">
            <option value="重症医学科">重症医学科</option>
            <option value="ICU">ICU</option>
            <option value="">全部科室</option>
          </select>
        </label>
        <label>
          年份
          <input type="number" id="year" class="input" min="2000" max="2099" />
        </label>
        <button class="btn-primary" id="btnYearQuery">按年查询</button>
        <label>
          开始月份
          <input type="month" id="startMonth" class="input" />
        </label>
        <span class="separator">—</span>
        <label>
          结束月份
          <input type="month" id="endMonth" class="input" />
        </label>
        <button class="btn-primary" id="btnRangeQuery">按月份查询</button>
      </div>
    </section>

    <div id="status" class="status">请选择条件后查询</div>

    <div class="table-wrapper">
      <table id="statsTable" class="stats-table">
        <thead>
          <tr id="tableHead">
            <th>序号</th>
            <th>指标名称</th>
            <th>单位</th>
            <th>总计</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="4" class="empty">暂无数据，请点击查询</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div id="detailModal" class="modal hidden">
    <div class="modal-panel">
      <div class="modal-titlebar">
        <span id="detailTitle">统计详情</span>
        <button class="modal-close" id="btnCloseDetail" title="关闭">×</button>
      </div>
      <div class="modal-body">
        <div class="modal-toolbar">
          <button class="btn-primary" id="btnExportDetail">导出Excel</button>
          <span class="detail-status" id="detailStatus"></span>
        </div>
        <div class="detail-table-wrap">
          <table class="detail-table">
            <thead><tr id="detailHead"></tr></thead>
            <tbody id="detailBody"></tbody>
          </table>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-primary modal-btn" id="btnOkDetail">确定</button>
        <button class="btn-ghost modal-btn" id="btnCancelDetail">取消</button>
      </div>
    </div>
  </div>

  <script src="/vendor/xlsx.full.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
